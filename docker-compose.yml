services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-message_app}
      DB_USER: ${DB_USER:-message_app}
      DB_PASSWORD: ${DB_PASSWORD:-change_me}
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${DB_NAME:-message_app}
      POSTGRES_USER: ${DB_USER:-message_app}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-change_me}
    ports:
      - "5432:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-message_app}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  db-data:
